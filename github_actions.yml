name: Healthcare MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Weekly retraining trigger

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: healthcare-mlops
  ECS_CLUSTER: healthcare-cluster
  ECS_SERVICE: healthcare-api-service
  CONTAINER_NAME: healthcare-api
  PYTHON_VERSION: "3.11"

jobs:

  # ─── Job 1: Code Quality & Tests ────────────────────────────────
  test:
    name: Test & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black isort

      - name: Code formatting check (Black)
        run: black --check src/ api/ monitoring/

      - name: Import sorting check (isort)
        run: isort --check-only src/ api/ monitoring/

      - name: Linting (flake8)
        run: flake8 src/ api/ monitoring/ --max-line-length=120 --ignore=E203,W503

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # ─── Job 2: Data Pipeline Validation ────────────────────────────
  validate-pipeline:
    name: Validate Data Pipeline
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data ingestion
        run: python -m src.ingestion.data_ingestion

      - name: Run data validation
        run: python -m src.validation.data_validation

      - name: Run feature engineering
        run: python -m src.features.feature_engineering

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: processed-data
          path: data/processed/
          retention-days: 7

  # ─── Job 3: Model Training (Weekly) ─────────────────────────────
  train-model:
    name: Train & Register Model
    runs-on: ubuntu-latest
    needs: validate-pipeline
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[retrain]')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v3
        with:
          name: processed-data
          path: data/processed/

      - name: Train models
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python -m src.training.model_training

      - name: Upload trained model
        uses: actions/upload-artifact@v3
        with:
          name: trained-model
          path: data/processed/best_model.pkl
          retention-days: 30

  # ─── Job 4: Build Docker Image ───────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: table
          exit-code: 1
          severity: CRITICAL

  # ─── Job 5: Deploy to AWS ECS ────────────────────────────────────
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition healthcare-api \
            --query taskDefinition > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment
        run: |
          echo "Deployment complete. Verifying health..."
          sleep 30
          curl -f ${{ secrets.API_URL }}/health || exit 1
          echo "Health check passed!"

  # ─── Job 6: Drift Detection ──────────────────────────────────────
  drift-check:
    name: Production Drift Detection
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drift detection
        run: python -m monitoring.drift_detection

      - name: Check drift report
        run: |
          if [ -f "data/drift/retraining_trigger.json" ]; then
            echo "Drift detected — triggering retraining workflow"
            gh workflow run retrain.yml
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
